name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check packages
        run:
          pnpm --filter "./packages/*" run build:self && pnpm --filter
          "./packages/*" run check:self

      - name: Run package tests
        run: pnpm --filter "./packages/*" --if-present run test:self

      - name: Build packages
        run: pnpm --filter "./packages/*" run build:self

      - name: Verify CLI works
        run: node packages/cli/dist/index.js --help
